<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <style>
    .fade-in { opacity: 0; animation: fadeIn 0.6s ease forwards; }
    .section-1 { animation-delay: 0.2s; }
    .section-2 { animation-delay: 0.5s; }
    .section-3 { animation-delay: 0.8s; }
    .section-4 { animation-delay: 1.1s; }
    .section-5 { animation-delay: 1.4s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .card-title { font-size: 18px; font-weight: 700; fill: #1E293B; }
    .section-title { font-size: 14px; font-weight: 600; fill: #2563EB; }
    .label { font-size: 12px; fill: #64748B; }
    .value { font-size: 13px; font-weight: 600; fill: #1E293B; }
    .total-label { font-size: 13px; font-weight: 600; fill: #2563EB; }
    .total-value { font-size: 14px; font-weight: 700; fill: #1E293B; }
  </style>

  <!-- Card Background -->
  <rect width="320" height="400" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Header -->
  <g class="fade-in section-1">
    <text x="24" y="36" class="card-title">Period Summary</text>
    <line x1="24" y1="48" x2="296" y2="48" stroke="#E2E8F0"/>
    <text x="24" y="68" class="label">Employees: </text>
    <text x="96" y="68" class="value">18</text>
  </g>

  <!-- Week 1 -->
  <g class="fade-in section-2">
    <text x="24" y="100" class="section-title">Week 1</text>
    <text x="24" y="120" class="label">Regular hours:</text>
    <text x="120" y="120" class="value">452.11</text>
    <text x="185" y="120" class="label">Overtime:</text>
    <text x="250" y="120" class="value">0.00</text>
    <text x="24" y="140" class="label">After hours:</text>
    <text x="120" y="140" class="value">1.00</text>
    <text x="185" y="140" class="label">Total hours:</text>
    <text x="260" y="140" class="value">453.11</text>
  </g>

  <!-- Week 2 -->
  <g class="fade-in section-3">
    <line x1="24" y1="158" x2="296" y2="158" stroke="#F1F5F9"/>
    <text x="24" y="180" class="section-title">Week 2</text>
    <text x="24" y="200" class="label">Regular hours:</text>
    <text x="120" y="200" class="value">437.29</text>
    <text x="185" y="200" class="label">Overtime:</text>
    <text x="250" y="200" class="value">12.22</text>
    <text x="24" y="220" class="label">After hours:</text>
    <text x="120" y="220" class="value">1.00</text>
    <text x="185" y="220" class="label">Total hours:</text>
    <text x="260" y="220" class="value">450.51</text>
  </g>

  <!-- Total -->
  <g class="fade-in section-4">
    <line x1="24" y1="240" x2="296" y2="240" stroke="#E2E8F0"/>
    <text x="24" y="268" class="total-label">Total</text>
    <text x="24" y="290" class="label">Regular hours:</text>
    <text x="120" y="290" class="total-value">895.50</text>
    <text x="185" y="290" class="label">Overtime:</text>
    <text x="250" y="290" class="total-value">12.22</text>
    <text x="24" y="312" class="label">After hours:</text>
    <text x="120" y="312" class="total-value">2.00</text>
    <text x="185" y="312" class="label">Total hours:</text>
    <text x="260" y="312" class="total-value">909.72</text>
  </g>

  <!-- Tips -->
  <g class="fade-in section-5">
    <line x1="24" y1="332" x2="296" y2="332" stroke="#E2E8F0"/>
    <text x="24" y="360" class="label">Tips:</text>
    <text x="60" y="360" class="total-value">1974.02</text>
  </g>
</svg>
